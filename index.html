<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Stats preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="container">
        <div class="img-mobile-container">
          <img
            src="images/image-header-mobile.jpg"
            alt="Employees in Meeting"
            class="content-mobile-image"
          />
        </div>
        <div class="content-container">
          <h1 class="heading">
            Get <span>insights</span> that help your business grow.
          </h1>
          <p class="description">
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
          </p>
          <div class="stats-info">
            <div>
              <div class="stat">10k+</div>
              <p class="stat-label">companies</p>
            </div>
            <div>
              <div class="stat">314</div>
              <p class="stat-label">templates</p>
            </div>
            <div>
              <div class="stat">12M+</div>
              <p class="stat-label">queries</p>
            </div>
          </div>
        </div>
        <div class="img-container">
          <img
            src="images/image-header-desktop.jpg"
            alt="Employees in a meeting"
            class="content-image"
          />
        </div>
      </div>
    </section>
  </body>
</html>
